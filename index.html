<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop Menu</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-content">
                <h1 class="nav-title">☕ Alarica</h1>
                <div class="nav-links">
                    <a href="index.html" class="nav-link active">Anasayfa</a>
                    <a href="menu.html" class="nav-link">Menü</a>
                    <a href="admin.html" class="nav-link admin-link" style="display: none;">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <h2 class="hero-title">Hoşgeldiniz</h2>
                <p class="hero-subtitle">Premium kahve çeşitlerimizi keşfedin</p>
                <a href="menu.html" class="button button-primary">Menüyü Görüntüle</a>
            </div>
        </div>
    </div>

    <!-- Features Section -->
    <div class="features">
        <div class="features-container">
            <div class="feature-card">
                <div class="feature-icon">☕</div>
                <h3>Premium Coffee</h3>
                <p>Elle seçilmiş kahve çekirdekleri</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">👨‍🍳</div>
                <h3>Uzman Baristalar</h3>
                <p>Uzman baristalar tarafından hazırlanmış kahveler</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🌟</div>
                <h3>Yüksek Standartlar</h3>
                <p>Her kase bizim yüksek standartlarımızı karşılar</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
