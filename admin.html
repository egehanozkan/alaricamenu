<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Coffee Shop</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-content">
                    <h1 class="nav-title">
                        <img src="images/ALogo.jpeg" alt="Alarica Logo" class="nav-logo">
                        <img src="images/AAd.jpeg" alt="Alarica Ad" class="nav-ad"></h1>
                    <div class="nav-links">
                    <a href="index.html" class="nav-link">Anasayfa</a>
                    <a href="menu.html" class="nav-link active">Menü</a>
                    <a href="admin.html" class="nav-link admin-link" style="display: none;">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Admin Login -->
    <div id="adminLogin" class="admin-login">
        <div class="login-container">
            <div class="login-card">
                <h1>Admin Erişimi</h1>
                <p class="login-subtitle">Admin şifresini girerek erişim sağlayın</p>
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">E-posta</label>
                        <input type="email" id="email" name="email" required placeholder="Admin e-posta adresiniz">
                    </div>
                    <div class="form-group">
                        <label for="password">Şifre</label>
                        <input type="password" id="password" name="password" required placeholder="Şifrenizi girin">
                    </div>
                    <button type="submit" class="button button-primary" style="width: 100%;">Giriş Yap</button>
                </form>
                <p id="loginError" class="login-error" style="display: none; color: #ef4444; margin-top: 1rem; text-align: center;"></p>
            </div>
        </div>
    </div>

    <!-- Admin Panel (Hidden until login) -->
    <div id="adminPanel" class="admin-page" style="display: none;">
        <div class="admin-container">
            <div class="admin-header">
                <div>
                    <h1>Admin Panel</h1>
                </div>
                <button id="logoutBtn" class="button button-secondary">Logout</button>
            </div>

            <!-- Kategori Yönetimi -->
            <div class="category-management" style="margin-bottom: 2rem;">
                <div class="form-card">
                    <h2>Kategori Yönetimi</h2>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                        <input type="text" id="categoryName" placeholder="Kategori adı" style="flex: 1; padding: 0.5rem 1rem; border: 2px solid var(--coffee-200); border-radius: 0.375rem; font-size: 1rem;">
                        <input type="number" id="categoryOrder" placeholder="Sıra" style="width: 80px; padding: 0.5rem; border: 2px solid var(--coffee-200); border-radius: 0.375rem; font-size: 1rem;" min="0" step="1">
                        <button id="addCategoryBtn" class="button button-primary" style="white-space: nowrap;">Ekle</button>
                        <button id="cancelCategoryBtn" class="button button-secondary" style="white-space: nowrap; display: none;">İptal</button>
                    </div>
                    <div id="categoriesList" style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                    </div>
                </div>
            </div>

            <div class="admin-grid">
                <!-- Form Section -->
                <div class="admin-form-section">
                    <div class="form-card">
                        <h2 id="formTitle">Yeni Ürün Ekle</h2>

                        <form id="menuForm" class="menu-form">
                            <div class="form-group">
                                <label for="name">İsim</label>
                                <input type="text" id="name" name="name" required placeholder="Coffee name">
                            </div>

                            <div class="form-group">
                                <label for="description">Açıklama</label>
                                <textarea id="description" name="description" required rows="3" placeholder="Item description"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="price">Fiyat (₺)</label>
                                <input type="number" id="price" name="price" required step="0.01" min="0" placeholder="0.00">
                            </div>

                            <div class="form-group">
                                <label for="image">Ürün Resmi</label>
                                <input type="file" id="image" name="image" accept="image/*" placeholder="Choose image">
                                <small style="color: #6d463a; display: block; margin-top: 0.25rem;">JPG, PNG up to 5MB</small>
                                <div id="imagePreview" style="margin-top: 1rem; display: none;">
                                    <img id="previewImage" style="max-width: 100%; border-radius: 0.375rem;" />
                                    <button type="button" id="removeImageBtn" style="margin-top: 0.5rem; background: #ef4444; color: white; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">Resmi Kaldır</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="category">Kategori</label>
                                <select id="category" name="category" required>
                                    <option value="">Kategori seçin...</option>
                                </select>
                            </div>

                            <div class="form-buttons">
                                <button type="submit" class="button button-primary">Ürün Ekle</button>
                                <button type="button" id="cancelBtn" class="button button-secondary" style="display: none;">İptal</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Items List Section -->
                <div class="admin-items-section">
                    <div class="items-card">
                        <h2>Ürünler(<span id="itemCount">0</span>)</h2>

                        <div id="itemsList" class="items-list">
                            <p class="no-items">Hiç ürün yok. İlk ürünü ekle!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
